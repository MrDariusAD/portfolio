<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />

    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Salih Özdemir — Senior Software Engineer in Düsseldorf, specialising in Angular and .NET. Architecting robust systems and delightful digital experiences."
    />
    <meta name="author" content="Salih-Can Özdemir" />
    <meta name="theme-color" content="#a80633" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Salih Özdemir — Senior Software Engineer" />
    <meta
      property="og:description"
      content="Angular & .NET specialist. Robust backend architectures, rich responsive UIs."
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      Anti-flash theme bootstrap: applies the persisted / system theme to <html>
      before Angular renders, so there is no light→dark flicker on first paint.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('portfolio-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored ? stored === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-canvas text-content antialiased">
    <app-root>
      <!-- Lightweight first-paint loader -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh">
        <div
          style="width:44px;height:44px;border:3px solid #a8063333;border-top-color:#a80633;border-radius:50%;animation:s 0.8s linear infinite"
        ></div>
      </div>
      <style>
        @keyframes s {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </app-root>
  </body>
</html>
