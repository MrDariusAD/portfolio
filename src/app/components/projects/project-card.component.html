    <article
      class="card anim-border theme-transition group flex h-full flex-col overflow-hidden transition-all duration-300 ease-in-out hover:-translate-y-1.5 hover:shadow-glow"
    >
      <!-- Crimson→gold top accent with idle shimmer, intensifies on hover -->
      <div
        class="animate-gradient-pan h-1 w-full bg-gradient-to-r from-gs-crimson-700 via-gs-gold-400 to-gs-crimson-700 opacity-70 transition-opacity duration-300 group-hover:opacity-100"
        style="background-size: 200% auto"
      ></div>

      <!-- Clickable body opens the detail dialog -->
      <button
        type="button"
        (click)="open.emit(project())"
        class="flex flex-1 flex-col p-5 text-left"
        [attr.aria-label]="i18n.t('projects.openDetails') + ' ' + project().title"
      >
        <div class="flex items-center gap-3">
          <span
            class="grid h-11 w-11 place-items-center rounded-xl bg-gs-crimson-700/10 text-2xl transition-transform duration-300 ease-in-out group-hover:scale-110 dark:bg-gs-crimson-500/15"
          >
            {{ project().icon || '🚀' }}
          </span>
          <h3 class="text-lg font-bold text-content">{{ project().title }}</h3>
        </div>

        <p class="mt-3 flex-1 text-sm leading-relaxed text-content-muted">
          {{ project().shortSummary }}
        </p>

        <div class="mt-4 flex flex-wrap gap-1.5">
          <span
            *ngFor="let t of project().techStack.slice(0, 4)"
            class="pill border border-hairline bg-surface-muted text-[11px] text-content-muted"
          >
            {{ t }}
          </span>
          <span
            *ngIf="project().techStack.length > 4"
            class="pill text-[11px] text-content-muted"
          >
            +{{ project().techStack.length - 4 }}
          </span>
        </div>

        <span
          class="mt-5 inline-flex items-center gap-1.5 text-sm font-semibold text-gs-crimson-700 transition-all duration-300 group-hover:gap-2.5 dark:text-gs-gold-400"
        >
          {{ i18n.t('projects.viewDetails') }}
          <i class="pi pi-arrow-right animate-bob-x text-xs group-hover:animate-none"></i>
        </span>
      </button>

      <!-- Footer: only rendered when the project actually has links to show -->
      <div
        *ngIf="hasFooter()"
        class="flex items-center justify-between gap-3 border-t border-hairline px-5 py-3"
      >
        <a
          *ngIf="project().githubUrl"
          [href]="project().githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-1.5 text-sm font-medium text-content-muted transition-colors duration-300 hover:text-gs-crimson-700 dark:hover:text-gs-gold-400"
          aria-label="GitHub repository"
        >
          <i class="pi pi-github"></i> {{ i18n.t('projects.code') }}
        </a>
        <span *ngIf="!project().githubUrl"></span>

        <!-- Hidden privacy / GDPR deep links — surfaced only here and in the dialog -->
        <div
          *ngIf="project().hasPrivacyPolicy || project().hasGdprInstructions"
          class="flex items-center gap-3 text-xs"
        >
          <a
            *ngIf="project().hasPrivacyPolicy"
            [routerLink]="['/projects', project().slug, 'privacy']"
            class="text-content-muted underline-offset-2 transition-colors duration-300 hover:text-gs-gold-600 hover:underline"
            >{{ i18n.t('projects.privacy') }}</a
          >
          <a
            *ngIf="project().hasGdprInstructions"
            [routerLink]="['/projects', project().slug, 'gdpr']"
            class="text-content-muted underline-offset-2 transition-colors duration-300 hover:text-gs-gold-600 hover:underline"
            >{{ i18n.t('projects.gdpr') }}</a
          >
        </div>
      </div>
    </article>
